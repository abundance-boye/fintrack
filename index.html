<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0e">
<title>Лимит — трекер трат</title>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22%D0%9B%D0%B8%D0%BC%D0%B8%D1%82%22%2C%22short_name%22%3A%22%D0%9B%D0%B8%D0%BC%D0%B8%D1%82%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23111%22%2C%22theme_color%22%3A%22%23111%22%7D">
<style>
  :root{
    --bg:#f7f6f2; --card:#ffffff; --ink:#181816; --ink2:#6b6a63; --ink3:#9b9a91;
    --line:#e7e5dd; --accent:#1f8f6a; --amber:#b8791a; --red:#cf5330;
    --shadow:0 1px 2px rgba(0,0,0,.04);
    --pool-bg:#eeece4;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0f0f0e; --card:#1b1b19; --ink:#f2f1ea; --ink2:#a3a299; --ink3:#6d6c64;
      --line:#2b2b28; --accent:#3bbd8f; --amber:#e0a13c; --red:#e5744a; --shadow:none; --pool-bg:#242320; }
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased}
  body{max-width:460px;margin:0 auto;padding:20px 16px calc(24px + env(safe-area-inset-bottom));min-height:100vh}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .date{font-size:14px;color:var(--ink2);text-transform:capitalize}
  .gear{background:none;border:none;color:var(--ink3);font-size:20px;cursor:pointer;padding:6px;line-height:1}

  .hero{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px 22px;box-shadow:var(--shadow);text-align:center;margin-bottom:14px}
  .hero .lbl{font-size:13px;color:var(--ink2);letter-spacing:.02em}
  .hero .big{font-size:52px;font-weight:600;letter-spacing:-.02em;line-height:1.05;margin:6px 0 2px;transition:color .3s}
  .hero .of{font-size:13px;color:var(--ink3)}
  .track{height:8px;background:var(--pool-bg);border-radius:99px;overflow:hidden;margin:16px 0 4px}
  .fill{height:100%;border-radius:99px;transition:width .35s,background .3s}
  .pool{font-size:12.5px;color:var(--ink2);margin-top:10px}
  .pool b{color:var(--ink);font-weight:600}

  .week{display:flex;gap:6px;margin:16px 2px 20px}
  .day{flex:1;text-align:center}
  .day .bar{height:34px;border-radius:7px;background:var(--pool-bg);position:relative;overflow:hidden;display:flex;align-items:flex-end}
  .day .bin{width:100%;border-radius:7px 7px 0 0;transition:height .3s}
  .day .dl{font-size:10px;color:var(--ink3);margin-top:5px}
  .day.today .dl{color:var(--ink);font-weight:600}

  .add{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:18px}
  .amt{width:100%;border:none;background:transparent;color:var(--ink);font-size:34px;font-weight:600;text-align:center;letter-spacing:-.01em;outline:none;font-variant-numeric:tabular-nums}
  .amt::placeholder{color:var(--ink3)}
  .cats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
  .cat{border:1px solid var(--line);background:transparent;color:var(--ink2);border-radius:12px;padding:9px 4px;font-size:12.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:.15s}
  .cat .dot{width:9px;height:9px;border-radius:99px}
  .cat.on{border-color:var(--ink);color:var(--ink);background:var(--pool-bg)}
  .addbtn{width:100%;border:none;border-radius:13px;background:var(--ink);color:var(--bg);font-size:16px;font-weight:600;padding:14px;cursor:pointer;transition:.15s}
  .addbtn:active{transform:scale(.985)}
  .addbtn:disabled{opacity:.4}

  .list h3{font-size:13px;color:var(--ink2);font-weight:500;margin:0 2px 10px;display:flex;justify-content:space-between}
  .row{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .rdot{width:10px;height:10px;border-radius:99px;flex:none}
  .rcat{font-size:14.5px}
  .rtime{font-size:12px;color:var(--ink3)}
  .ramt{margin-left:auto;font-size:15px;font-weight:600}
  .del{background:none;border:none;color:var(--ink3);font-size:15px;cursor:pointer;padding:4px 6px;margin-left:4px}
  .empty{text-align:center;color:var(--ink3);font-size:13.5px;padding:22px 0}

  .month{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}
  .mc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 10px;text-align:center}
  .mc .mv{font-size:19px;font-weight:600}
  .mc .ml{font-size:11px;color:var(--ink2);margin-top:3px}

  .sheet{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;z-index:10}
  .sheet.open{display:flex}
  .panel{background:var(--card);width:100%;max-width:460px;margin:0 auto;border-radius:20px 20px 0 0;padding:22px 18px calc(26px + env(safe-area-inset-bottom))}
  .panel h2{font-size:17px;margin-bottom:18px}
  .frow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .frow label{font-size:14.5px}
  .frow input[type=number]{width:110px;border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:9px;padding:8px 10px;font-size:15px;text-align:right;font-variant-numeric:tabular-nums}
  .sw{width:46px;height:27px;border-radius:99px;background:var(--pool-bg);border:none;position:relative;cursor:pointer;transition:.2s}
  .sw.on{background:var(--accent)}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:99px;background:#fff;transition:.2s}
  .sw.on::after{left:22px}
  .reset{width:100%;margin-top:16px;border:1px solid var(--red);color:var(--red);background:transparent;border-radius:12px;padding:12px;font-size:14px;cursor:pointer}
  .done{width:100%;margin-top:10px;border:none;background:var(--ink);color:var(--bg);border-radius:12px;padding:13px;font-size:15px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
  <div class="top">
    <div class="date" id="date"></div>
    <button class="gear" id="gear" aria-label="Настройки">⚙</button>
  </div>

  <div class="hero">
    <div class="lbl" id="heroLbl">Осталось сегодня</div>
    <div class="big" id="heroBig">—</div>
    <div class="of" id="heroOf"></div>
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="pool" id="pool"></div>
  </div>

  <div class="week" id="week"></div>

  <div class="add">
    <input class="amt" id="amt" type="number" inputmode="numeric" placeholder="0" min="0">
    <div class="cats" id="cats"></div>
    <button class="addbtn" id="addbtn" disabled>Добавить трату</button>
  </div>

  <div class="list">
    <h3><span id="listTitle">Сегодня</span><span id="listSum"></span></h3>
    <div id="rows"></div>
  </div>

  <div class="month" id="month"></div>

  <div class="sheet" id="sheet">
    <div class="panel">
      <h2>Настройки</h2>
      <div class="frow"><label>Лимит в день, ₸</label><input type="number" id="setLimit" min="0" step="100"></div>
      <div class="frow"><label>Переносить остаток<br><span style="font-size:12px;color:var(--ink2)">запас на следующий день недели</span></label><button class="sw" id="setRoll"></button></div>
      <button class="reset" id="reset">Очистить все данные</button>
      <button class="done" id="done">Готово</button>
    </div>
  </div>

<script>
(function(){
  var CATS=[
    {id:"food",  name:"Продукты", color:"#1f8f6a"},
    {id:"cafe",  name:"Кафе",     color:"#b8791a"},
    {id:"trans", name:"Транспорт",color:"#3a72c4"},
    {id:"other", name:"Прочее",   color:"#8a8880"}
  ];
  var mem={}; // fallback if localStorage blocked
  function load(k,d){try{var v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return k in mem?mem[k]:d;}}
  function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){mem[k]=v;}}

  var S=load("lm_settings",{limit:3000,roll:true});
  var E=load("lm_exp",[]); // {id,ts,amount,cat}
  var sel=null;

  var fmt=new Intl.NumberFormat("ru-RU");
  function money(n){return fmt.format(Math.round(n))+" ₸";}
  function dkey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  function today(){return new Date();}
  function weekStart(d){var x=new Date(d);var wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);x.setHours(0,0,0,0);return x;}

  function spentOn(key){var s=0;E.forEach(function(e){if(dkey(new Date(e.ts))===key)s+=e.amount;});return s;}
  function state(rem){ if(rem<0)return"red"; if(rem<=S.limit*0.2)return"amber"; return"accent"; }
  function col(st){return st==="red"?"var(--red)":st==="amber"?"var(--amber)":"var(--accent)";}

  function render(){
    var now=today(), tk=dkey(now);
    document.getElementById("date").textContent=now.toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"});

    // week pool
    var ws=weekStart(now), priorBudget=0, priorSpent=0;
    for(var i=0;i<7;i++){var d=new Date(ws);d.setDate(ws.getDate()+i);var k=dkey(d);
      if(d<new Date(tk)){priorBudget+=S.limit;priorSpent+=spentOn(k);} }
    var cushion=priorBudget-priorSpent; // + ahead, - behind
    var tSpent=spentOn(tk);
    var effLimit=S.roll?S.limit+cushion:S.limit;
    var rem=effLimit-tSpent;
    var st=state(rem);

    var big=document.getElementById("heroBig");
    big.textContent=money(rem); big.style.color=col(st);
    document.getElementById("heroLbl").textContent=rem<0?"Перерасход сегодня":"Осталось сегодня";
    document.getElementById("heroOf").textContent="из "+money(effLimit)+(S.roll&&cushion!==0?(cushion>0?" (с запасом +"+money(cushion)+")":" (минус "+money(-cushion)+" за неделю)"):"");
    var pct=Math.max(0,Math.min(100, effLimit>0?(tSpent/effLimit*100):100));
    var f=document.getElementById("fill"); f.style.width=pct+"%"; f.style.background=col(st);

    var poolEl=document.getElementById("pool");
    if(S.roll){ poolEl.innerHTML = cushion>=0 ? "Запас недели: <b>+"+money(cushion)+"</b> — дешёвые дни дают подушку" : "Отставание за неделю: <b>−"+money(-cushion)+"</b>"; }
    else { poolEl.innerHTML="Строгий дневной лимит без переноса"; }

    // week strip
    var wk=document.getElementById("week"); wk.innerHTML="";
    var names=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
    for(var j=0;j<7;j++){
      var d2=new Date(ws);d2.setDate(ws.getDate()+j);var k2=dkey(d2);
      var sp=spentOn(k2), isToday=k2===tk, future=d2>new Date(tk);
      var ratio=Math.min(1.4, S.limit>0?sp/S.limit:0);
      var h=Math.min(100,ratio*100);
      var barCol= sp>S.limit?"var(--red)": sp>S.limit*0.8?"var(--amber)":"var(--accent)";
      if(future){barCol="var(--pool-bg)";h=0;}
      var el=document.createElement("div");
      el.className="day"+(isToday?" today":"");
      el.innerHTML='<div class="bar"><div class="bin" style="height:'+h+'%;background:'+barCol+'"></div></div><div class="dl">'+names[j]+'</div>';
      wk.appendChild(el);
    }

    // today's rows
    var rows=document.getElementById("rows");
    var todayE=E.filter(function(e){return dkey(new Date(e.ts))===tk;}).sort(function(a,b){return b.ts-a.ts;});
    document.getElementById("listSum").textContent=todayE.length?money(tSpent):"";
    if(!todayE.length){ rows.innerHTML='<div class="empty">Пока нет трат. Первая покупка дня — выше.</div>'; }
    else{
      rows.innerHTML="";
      todayE.forEach(function(e){
        var c=CATS.find(function(x){return x.id===e.cat;})||CATS[3];
        var t=new Date(e.ts).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
        var r=document.createElement("div"); r.className="row";
        r.innerHTML='<span class="rdot" style="background:'+c.color+'"></span><div><div class="rcat">'+c.name+'</div><div class="rtime">'+t+'</div></div><span class="ramt">'+money(e.amount)+'</span><button class="del" aria-label="Удалить">✕</button>';
        r.querySelector(".del").onclick=function(){ E=E.filter(function(x){return x.id!==e.id;}); save("lm_exp",E); render(); };
        rows.appendChild(r);
      });
    }

    // month summary
    var mk=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
    var monthE=E.filter(function(e){return dkey(new Date(e.ts)).slice(0,7)===mk;});
    var mTotal=monthE.reduce(function(s,e){return s+e.amount;},0);
    var days=now.getDate();
    var byCat={}; monthE.forEach(function(e){byCat[e.cat]=(byCat[e.cat]||0)+e.amount;});
    var topCat=Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];})[0];
    var topName=topCat?(CATS.find(function(c){return c.id===topCat;})||{}).name:"—";
    document.getElementById("month").innerHTML=
      '<div class="mc"><div class="mv">'+money(mTotal)+'</div><div class="ml">за месяц</div></div>'+
      '<div class="mc"><div class="mv">'+money(days?mTotal/days:0)+'</div><div class="ml">в день (средн.)</div></div>'+
      '<div class="mc"><div class="mv" style="font-size:15px">'+topName+'</div><div class="ml">топ категория</div></div>';
  }

  // category chips
  var catsWrap=document.getElementById("cats");
  CATS.forEach(function(c){
    var b=document.createElement("button"); b.className="cat"; b.dataset.id=c.id;
    b.innerHTML='<span class="dot" style="background:'+c.color+'"></span>'+c.name;
    b.onclick=function(){ sel=c.id; document.querySelectorAll(".cat").forEach(function(x){x.classList.remove("on");}); b.classList.add("on"); checkAdd(); };
    catsWrap.appendChild(b);
  });
  var amt=document.getElementById("amt"), addbtn=document.getElementById("addbtn");
  function checkAdd(){ addbtn.disabled=!(parseFloat(amt.value)>0 && sel); }
  amt.oninput=checkAdd;
  addbtn.onclick=function(){
    var v=parseFloat(amt.value); if(!(v>0)||!sel)return;
    E.push({id:Date.now()+"-"+Math.random().toString(36).slice(2,6),ts:Date.now(),amount:v,cat:sel});
    save("lm_exp",E);
    amt.value=""; sel=null; document.querySelectorAll(".cat").forEach(function(x){x.classList.remove("on");});
    checkAdd(); render();
  };

  // settings sheet
  var sheet=document.getElementById("sheet"), setLimit=document.getElementById("setLimit"), setRoll=document.getElementById("setRoll");
  document.getElementById("gear").onclick=function(){ setLimit.value=S.limit; setRoll.classList.toggle("on",S.roll); sheet.classList.add("open"); };
  setRoll.onclick=function(){ setRoll.classList.toggle("on"); };
  document.getElementById("done").onclick=function(){
    var l=parseFloat(setLimit.value); if(l>0)S.limit=l; S.roll=setRoll.classList.contains("on");
    save("lm_settings",S); sheet.classList.remove("open"); render();
  };
  document.getElementById("reset").onclick=function(){
    if(confirm("Удалить все траты и настройки? Это необратимо.")){ E=[]; S={limit:3000,roll:true}; save("lm_exp",E); save("lm_settings",S); sheet.classList.remove("open"); render(); }
  };
  sheet.onclick=function(e){ if(e.target===sheet)sheet.classList.remove("open"); };

  render();
})();
</script>
</body>
</html>
